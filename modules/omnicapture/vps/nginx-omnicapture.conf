# OmniCapture TLS reverse proxy
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

upstream omnicapture_backend {
    server 127.0.0.1:9876;
}

server {
    listen 9877 ssl;
    server_name kobiiclaw.example.com;

    # TLS — Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/kobiiclaw.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kobiiclaw.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Max body size for batch ingest
    client_max_body_size 5m;

    # REST endpoints
    location /api/v1/ {
        proxy_pass http://omnicapture_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint
    location /api/v1/stream {
        proxy_pass http://omnicapture_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
